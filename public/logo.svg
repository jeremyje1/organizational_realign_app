<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Circle background -->
  <circle cx="50" cy="50" r="45" fill="white" stroke="#0f3860" stroke-width="2"/>
  
  <!-- Compass Rose Design -->
  <g fill="#0f3860">
    <!-- North, East, South, West points -->
    <polygon points="50,5 55,20 50,15 45,20" />
    <polygon points="95,50 80,55 85,50 80,45" />
    <polygon points="50,95 45,80 50,85 55,80" />
    <polygon points="5,50 20,45 15,50 20,55" />
    
    <!-- NE, SE, SW, NW points -->
    <polygon points="80,20 70,30 75,25 65,35" />
    <polygon points="80,80 70,70 75,75 65,65" />
    <polygon points="20,80 30,70 25,75 35,65" />
    <polygon points="20,20 30,30 25,25 35,35" />
    
    <!-- Inner compass needle -->
    <path d="M50,30 L55,50 50,70 45,50 Z" />
  </g>
  
  <!-- Center circle -->
  <circle cx="50" cy="50" r="5" fill="#0f3860" />
</svg>